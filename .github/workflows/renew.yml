name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点触发 (北京时间 8点)
  workflow_dispatch:     # 允许手动触发

jobs:
  run_every_4_days:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate if today is execution day
        id: check_day
        run: |
          # 设置第一次执行日期
          START_DATE="2026-03-20"
          
          # 将日期转换为秒
          START_TS=$(date -d "$START_DATE" +%s)
          TODAY_TS=$(date -u +%s)
          
          # 计算天数差
          DIFF_DAYS=$(( (TODAY_TS - START_TS) / 86400 ))
          
          # 判断是否是 4 天的倍数
          if [ $DIFF_DAYS -lt 0 ]; then
            echo "Not reached start date yet. Exiting."
            exit 0
          fi
          
          if [ $((DIFF_DAYS % 4)) -ne 0 ]; then
            echo "Not the execution day. Exiting."
            exit 0
          fi
          
          echo "Today is execution day. Continue workflow."
          echo "continue=true" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        if: steps.check_day.outputs.continue == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check_day.outputs.continue == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        if: steps.check_day.outputs.continue == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install
          npx playwright install-deps chrome

      - name: Run Renew Script
        if: steps.check_day.outputs.continue == 'true'
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: steps.check_day.outputs.continue == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
